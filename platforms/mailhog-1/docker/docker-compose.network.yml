services:

  mailer:
    ports:
      - ${COMPOSE_PROJECT_HOST}::${COMPOSE_PROJECT_PORT:-1025}:1025       # SMTP port — send your app mails here
      - ${COMPOSE_PROJECT_HOST}::${COMPOSE_PROJECT_APP_PORT:-8025}:8025   # Web UI + API
    networks:
      net: {}

networks:
  net:
    driver: bridge
    external: true
    name: ${COMPOSE_PROJECT_LEAD}-${COMPOSE_PROJECT_CNET}
  default:
    external: true
    name: ${COMPOSE_PROJECT_LEAD}-${COMPOSE_PROJECT_CNET}